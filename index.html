<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#235a82">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Centrage DR400">
<title>Centrage DR400</title>
<link rel="manifest" href="manifest.json">
<style>
  :root{
    --bg:#eef2f6; --panel:#ffffff; --panel2:#f3f7fa;
    --ink:#16242f; --muted:#5e7184; --faint:#93a3b2;
    --line:#dde5ec; --line2:#c5d1db;
    --steel:#2f6f9f; --steel-dk:#235a82; --steel-soft:#e9f1f7;
    --ok:#1f9d63; --ok-bg:#e7f6ee;
    --bad:#d4344a; --bad-bg:#fdebee;
    --warn:#b07d10; --warn-bg:#fbf2da;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Roboto Mono",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;font-size:15px;line-height:1.4}
  body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
  .wrap{max-width:1000px;margin:0 auto;padding:14px 14px 40px}

  header{display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:6px 2px 14px;flex-wrap:wrap}
  header .logo{height:42px;width:auto;order:-1;flex:none}
  @media(max-width:520px){header .logo{height:34px}}
  .brand{display:flex;align-items:baseline;gap:10px}
  .brand h1{font-size:18px;font-weight:700;letter-spacing:.06em;color:var(--steel-dk);text-transform:uppercase}
  .brand .sub{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.06em}
  .ver{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:.1em}

  .tabs{display:flex;gap:6px;margin-bottom:14px}
  .tab{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--muted);
    font-family:var(--mono);font-size:13px;letter-spacing:.08em;padding:11px 8px;cursor:pointer;
    border-radius:8px;transition:.15s;text-transform:uppercase}
  .tab:hover{color:var(--ink);border-color:var(--line2)}
  .tab.active{color:#fff;background:var(--steel);border-color:var(--steel)}
  .tab .dot{display:inline-block;width:6px;height:6px;border-radius:50%;
    background:var(--warn);margin-left:6px;vertical-align:middle}
  .tab.active .dot{background:#ffd779}

  .banner{background:var(--warn-bg);border:1px solid #e7cf8a;border-radius:8px;
    padding:10px 12px;margin-bottom:14px;font-size:13px;color:#7a5910;display:none}
  .banner.show{display:block}
  .banner b{color:var(--warn)}

  .meta{font-family:var(--mono);font-size:11px;color:var(--muted);
    margin-bottom:14px;letter-spacing:.02em;line-height:1.6}

  .verdict{border-radius:10px;padding:13px 15px;margin-bottom:14px;border:1px solid;
    display:flex;align-items:center;gap:13px}
  .verdict .icon{width:32px;height:32px;border-radius:50%;flex:none;
    display:grid;place-items:center;font-size:17px;font-weight:700;color:#fff}
  .verdict .txt b{display:block;font-size:15px;letter-spacing:.06em;text-transform:uppercase}
  .verdict .txt span{font-size:12.5px;color:var(--ink);opacity:.85}
  .verdict.ok{background:var(--ok-bg);border-color:#a9dcc0;color:var(--ok)}
  .verdict.ok .icon{background:var(--ok)}
  .verdict.bad{background:var(--bad-bg);border-color:#f0b3bc;color:var(--bad)}
  .verdict.bad .icon{background:var(--bad)}

  .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:14px;align-items:start}
  @media(max-width:760px){.grid{grid-template-columns:1fr}}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .card h2{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    color:var(--steel-dk);padding:11px 14px;border-bottom:1px solid var(--line);background:var(--panel2)}

  table.load{width:100%;border-collapse:collapse;font-size:14px}
  table.load thead th{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.06em;
    text-transform:uppercase;color:var(--muted);text-align:right;padding:9px 12px;
    border-bottom:1px solid var(--line2);background:var(--panel2)}
  table.load thead th:first-child{text-align:left}
  table.load td{padding:0;border-bottom:1px solid var(--line)}
  table.load .poste{padding:10px 12px;font-size:13.5px}
  table.load .poste small{display:block;font-family:var(--mono);font-size:10px;color:var(--faint)}
  table.load .num{font-family:var(--mono);text-align:right;padding:10px 12px;white-space:nowrap}
  table.load .num.dim{color:var(--muted);font-size:13px}
  table.load tr.fixed .poste{color:var(--muted)}

  td.cell-in{padding:0;background:var(--steel-soft)}
  td.cell-in input{width:100%;height:100%;min-height:42px;border:none;background:transparent;
    color:var(--ink);font-family:var(--mono);font-size:15px;font-weight:600;text-align:right;
    padding:10px 12px;-webkit-appearance:none;appearance:none}
  td.cell-in input:focus{outline:2px solid var(--steel);outline-offset:-2px;background:#fff}
  input[type=number]{-moz-appearance:textfield}
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  td.cell-in .ltr{display:flex;align-items:center}
  td.cell-in .ltr .u{font-family:var(--mono);font-size:11px;color:var(--muted);padding-right:8px;padding-left:12px}

  table.load tr.total td{border-top:2px solid var(--line2);border-bottom:none;
    background:var(--panel2);font-weight:700}
  table.load tr.total .poste{font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--steel-dk)}
  table.load tr.total .num{font-size:15px;color:var(--ink)}
  table.load tr.zfw td{background:#fff}
  table.load tr.zfw .poste{font-size:12.5px;color:var(--muted)}
  table.load tr.zfw .num{font-size:13px;color:var(--muted)}

  .chartwrap{padding:12px 12px 4px}
  svg.abaque{width:100%;height:auto;display:block;font-family:var(--mono)}
  .legend{display:flex;gap:14px;flex-wrap:wrap;padding:6px 14px 12px;
    font-family:var(--mono);font-size:11px;color:var(--muted)}
  .legend i{display:inline-block;width:16px;height:0;border-top:2px solid;margin-right:6px;vertical-align:middle}
  .legend .pt{width:9px;height:9px;border-radius:50%;border:none}

  .lim{display:grid;grid-template-columns:1fr auto auto;gap:5px 10px;
    font-size:13px;align-items:baseline;padding:8px 14px;border-bottom:1px solid var(--line)}
  .lim:last-child{border-bottom:none}
  .lim .k{color:var(--muted)}
  .lim .v{font-family:var(--mono);text-align:right;color:var(--ink)}
  .lim .s{font-family:var(--mono);font-size:11px;text-align:right;min-width:46px;font-weight:600}
  .lim .s.ok{color:var(--ok)} .lim .s.bad{color:var(--bad)} .lim .s.warn{color:var(--warn)}

  .actions{display:flex;gap:10px;margin-top:14px}
  button.act{flex:1;background:var(--panel);border:1px solid var(--line2);color:var(--muted);
    font-family:var(--mono);font-size:12px;letter-spacing:.06em;padding:12px;border-radius:8px;
    cursor:pointer;text-transform:uppercase;transition:.15s}
  button.act:hover{color:var(--ink);border-color:var(--steel)}
  button.act.primary{background:var(--steel);border-color:var(--steel);color:#fff}
  button.act.primary:hover{background:var(--steel-dk);border-color:var(--steel-dk);color:#fff}
  button.act.arm{background:var(--bad-bg);border-color:var(--bad);color:var(--bad)}

  .foot{text-align:center;font-family:var(--mono);font-size:10px;color:var(--faint);
    margin-top:22px;letter-spacing:.04em;line-height:1.7}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}

  /* ---------- impression A4 portrait, page unique ---------- */
  @media print{
    @page{ size:A4 portrait; margin:10mm; }
    html,body{ background:#fff; -webkit-print-color-adjust:exact; print-color-adjust:exact; font-size:11px; }
    .wrap{ padding:0; max-width:none; }
    .tabs,.actions,.foot{ display:none !important; }
    header{ padding:0 0 6px; margin-bottom:8px; border-bottom:1px solid var(--line2); }
    header .logo{ height:34px; }
    .banner,.meta{ margin-bottom:8px; }
    .verdict{ margin-bottom:8px; padding:8px 12px; break-inside:avoid; }
    .grid{ grid-template-columns:1.05fr .95fr !important; gap:8px; }
    .card{ break-inside:avoid; }
    .card h2{ padding:6px 12px; }
    table.load .poste,table.load .num{ padding:5px 10px; }
    td.cell-in input{ min-height:0; padding:5px 10px; }
    td.cell-in,td.cell-in input{ background:#fff !important; }
    td.cell-in input:focus{ outline:none; }
    .chartwrap{ padding:8px }
    svg.abaque{ max-height:80mm }
    .legend{ padding:4px 12px 8px }
    .lim{ padding:5px 12px }
  }
</style>
</head>

<script>
"use strict";
/* ============================================================
   CONFIGURATION AVIONS
   Chaque avion = constantes de sa fiche de pesée.
   Moteur de calcul commun ; seules ces données changent.
   ============================================================ */
const FUEL_DENSITY = 0.72; // kg/L

const AIRCRAFT = {
  /* ---- F-HPYR : données réelles, pesée du 07/07/2023 ---- */
  "F-HPYR": {
    reg: "F-HPYR",
    weighing: "07/07/2023",
    provisional: false,
    empty:  { mass: 541.0, arm: 0.393 },
    stations: [
      { id:"cdb",   label:"CDB (pilote)",        arm:0.41, def:80, max:null },
      { id:"paxAv", label:"Passager avant",      arm:0.41, def:0,  max:null },
      { id:"paxAr", label:"Passager arrière",    arm:1.19, def:0,  max:null },
      { id:"bagAr", label:"Bagages côté Pax AR", arm:1.19, def:0,  max:40  },
      { id:"soute", label:"Soute condamnée",     arm:0.0,  def:0,  max:0   },
    ],
    fuel: { arm:1.12, maxL:109 },
    limits: { mtow:865, maxBag:40, maxFuelL:109 },
    envelope: [ [0.205,526],[0.205,750],[0.513,865],[0.564,865],[0.564,526] ],
    note: "Masse à vide incluant 1 L de carburant non utilisable."
  },

  /* ---- F-HAFF : données réelles, pesée du 25/03/2024 ---- */
  "F-HAFF": {
    reg: "F-HAFF",
    weighing: "25/03/2024",
    provisional: false,
    empty:  { mass: 543.0, arm: 0.409 },
    stations: [
      { id:"cdb",   label:"CDB (pilote)",        arm:0.41, def:80, max:null },
      { id:"paxAv", label:"Passager avant",      arm:0.41, def:0,  max:null },
      { id:"paxAr", label:"Passager arrière",    arm:1.19, def:0,  max:null },
      { id:"bagAr", label:"Bagages côté Pax AR", arm:1.19, def:0,  max:40  },
      { id:"soute", label:"Soute condamnée",     arm:0.0,  def:0,  max:0   },
    ],
    fuel: { arm:1.12, maxL:109 },
    limits: { mtow:865, maxBag:40, maxFuelL:109 },
    envelope: [ [0.205,526],[0.205,750],[0.513,865],[0.564,865],[0.564,526] ],
    note: "Masse à vide incluant 1 L de carburant non utilisable."
  }
};

/* ============================================================ ÉTAT ============================================================ */
let current = "F-HPYR";
const state = {};
function storeKey(reg){ return "centrage_" + reg; }
function loadState(reg){
  const ac = AIRCRAFT[reg], s = {};
  ac.stations.forEach(st => s[st.id] = st.def);
  s.fuelL = 0;
  try { const raw = localStorage.getItem(storeKey(reg)); if (raw) Object.assign(s, JSON.parse(raw)); } catch(e){}
  return s;
}
function saveState(reg){ try { localStorage.setItem(storeKey(reg), JSON.stringify(state[reg])); } catch(e){} }

/* ============================================================ CALCUL ============================================================ */
function compute(reg){
  const ac = AIRCRAFT[reg], s = state[reg];
  let mass = ac.empty.mass, moment = ac.empty.mass * ac.empty.arm;
  const lines = [{ label:"Avion vide", mass:ac.empty.mass, arm:ac.empty.arm, moment:ac.empty.mass*ac.empty.arm, fixed:true }];
  ac.stations.forEach(st => {
    const m = num(s[st.id]); const mo = m*st.arm;
    mass += m; moment += mo;
    lines.push({ id:st.id, label:st.label, mass:m, arm:st.arm, moment:mo, fixed:(st.max===0) });
  });
  const fuelL = num(s.fuelL), fuelMass = fuelL*FUEL_DENSITY, fuelMo = fuelMass*ac.fuel.arm;
  mass += fuelMass; moment += fuelMo;
  lines.push({ id:"fuelL", label:"Carburant", litres:fuelL, mass:fuelMass, arm:ac.fuel.arm, moment:fuelMo, isFuel:true });

  const cg = mass>0 ? moment/mass : 0;
  const zfwMass = mass - fuelMass, zfwMoment = moment - fuelMo;
  const zfwCg = zfwMass>0 ? zfwMoment/zfwMass : 0;
  return { mass, moment, cg, fuelL, fuelMass, zfwMass, zfwMoment, zfwCg, lines };
}

function inEnvelope(env,x,y){
  let inside=false;
  for(let i=0,j=env.length-1;i<env.length;j=i++){
    const xi=env[i][0],yi=env[i][1],xj=env[j][0],yj=env[j][1];
    if(((yi>y)!==(yj>y)) && (x<(xj-xi)*(y-yi)/(yj-yi)+xi)) inside=!inside;
  }
  return inside;
}
function num(v){ const n=parseFloat(v); return isFinite(n)?n:0; }
function fmt(n,d){ return n.toLocaleString("fr-FR",{minimumFractionDigits:d,maximumFractionDigits:d}); }

/* ============================================================ RENDU ============================================================ */
function buildTabs(){
  const el = document.getElementById("tabs"); el.innerHTML="";
  Object.keys(AIRCRAFT).forEach(reg => {
    const b=document.createElement("button");
    b.className="tab"+(reg===current?" active":"");
    b.innerHTML=reg+(AIRCRAFT[reg].provisional?'<span class="dot" title="données provisoires"></span>':"");
    b.onclick=()=>{ current=reg; renderAll(); };
    el.appendChild(b);
  });
}

function renderHeader(){
  const ac=AIRCRAFT[current];
  document.getElementById("reg").textContent=ac.reg;
  const banner=document.getElementById("banner");
  if(ac.provisional){
    banner.className="banner show";
    banner.innerHTML='<b>Données provisoires.</b> Cet onglet reprend la fiche F-HPYR. À remplacer dès réception de la pesée du '+ac.reg+'.';
  } else banner.className="banner";
  document.getElementById("meta").textContent =
    "Pesée "+ac.weighing+" · masse à vide "+fmt(ac.empty.mass,0)+" kg / bras "+fmt(ac.empty.arm,3)+" m · "+ac.note;
}

function renderResults(){ buildTable(); update(); }

/* Construit la structure du tableau UNE FOIS (à l'ouverture d'un onglet
   ou après reset). Les champs de saisie ne sont donc plus recréés à
   chaque frappe : le focus et le curseur restent en place. */
function buildTable(){
  const ac=AIRCRAFT[current], r=compute(current);
  const body=document.getElementById("loadBody"); body.innerHTML="";

  r.lines.forEach(L=>{
    const tr=document.createElement("tr");
    const momId='mom_'+(L.id||"vide");
    if(L.isFuel){
      tr.innerHTML =
        '<td class="poste">Carburant<small id="fuelkg"></small></td>'+
        '<td class="cell-in"><div class="ltr"><span class="u">L</span>'+
          '<input type="number" inputmode="decimal" step="any" min="0" max="'+ac.fuel.maxL+'" data-id="fuelL" value="'+state[current].fuelL+'"></div></td>'+
        '<td class="num dim">'+fmt(L.arm,3)+'</td>'+
        '<td class="num dim" id="'+momId+'"></td>';
    } else if(L.fixed){
      tr.className="fixed";
      tr.innerHTML =
        '<td class="poste">'+L.label+'</td>'+
        '<td class="num dim">'+fmt(L.mass,1)+'</td>'+
        '<td class="num dim">'+fmt(L.arm,3)+'</td>'+
        '<td class="num dim" id="'+momId+'"></td>';
    } else {
      tr.innerHTML =
        '<td class="poste">'+L.label+'</td>'+
        '<td class="cell-in"><input type="number" inputmode="decimal" step="any" min="0" data-id="'+L.id+'" value="'+state[current][L.id]+'"></td>'+
        '<td class="num dim">'+fmt(L.arm,3)+'</td>'+
        '<td class="num dim" id="'+momId+'"></td>';
    }
    body.appendChild(tr);
  });

  const tot=document.createElement("tr"); tot.className="total";
  tot.innerHTML='<td class="poste">Total — décollage</td><td class="num" id="tot_mass"></td><td class="num" id="tot_cg"></td><td class="num" id="tot_mom"></td>';
  body.appendChild(tot);

  const zfw=document.createElement("tr"); zfw.className="zfw";
  zfw.innerHTML='<td class="poste">Sans carburant (ZFW)</td><td class="num" id="zfw_mass"></td><td class="num" id="zfw_cg"></td><td class="num" id="zfw_mom"></td>';
  body.appendChild(zfw);

  bindInputs();
}

function setTxt(id,v){ const e=document.getElementById(id); if(e) e.textContent=v; }

/* Met à jour les valeurs calculées sans toucher aux champs de saisie. */
function update(){
  const ac=AIRCRAFT[current], r=compute(current);

  r.lines.forEach(L=>{ setTxt('mom_'+(L.id||"vide"), fmt(L.moment,1)); });
  setTxt("fuelkg", "densité "+fmt(FUEL_DENSITY,2)+" → "+fmt(r.fuelMass,1)+" kg");
  setTxt("tot_mass",fmt(r.mass,1)); setTxt("tot_cg",fmt(r.cg,3)); setTxt("tot_mom",fmt(r.moment,1));
  setTxt("zfw_mass",fmt(r.zfwMass,1)); setTxt("zfw_cg",fmt(r.zfwCg,3)); setTxt("zfw_mom",fmt(r.zfwMoment,1));

  const okMass=r.mass<=ac.limits.mtow+1e-6;
  const okTO=inEnvelope(ac.envelope,r.cg,r.mass);
  const okZFW=inEnvelope(ac.envelope,r.zfwCg,r.zfwMass);
  const conforme=okMass&&okTO&&okZFW;
  const v=document.getElementById("verdict");
  v.className="verdict "+(conforme?"ok":"bad");
  document.getElementById("vicon").textContent=conforme?"✓":"✕";
  document.getElementById("vtitle").textContent=conforme?"Conforme":"Hors limites";
  const reasons=[];
  if(!okMass) reasons.push("masse "+fmt(r.mass,0)+" kg > MTOW "+ac.limits.mtow+" kg");
  if(!okTO) reasons.push("point décollage hors enveloppe");
  if(!okZFW) reasons.push("point ZFW hors enveloppe");
  document.getElementById("vmsg").textContent = conforme
    ? "Masse et centrage dans l'enveloppe certifiée."
    : reasons.join(" · ");

  const bag=num(state[current].bagAr);
  document.getElementById("limits").innerHTML =
    limRow("Masse au décollage", fmt(r.mass,0)+" / "+ac.limits.mtow+" kg", okMass?"ok":"bad", okMass?"OK":"DÉPASSÉ")+
    limRow("Carburant", fmt(r.fuelL,0)+" / "+ac.limits.maxFuelL+" L", r.fuelL<=ac.limits.maxFuelL?"ok":"warn", r.fuelL<=ac.limits.maxFuelL?"OK":"> max")+
    limRow("Bagages AR", fmt(bag,0)+" / "+ac.limits.maxBag+" kg", bag<=ac.limits.maxBag?"ok":"warn", bag<=ac.limits.maxBag?"OK":"> max")+
    limRow("CG décollage", fmt(r.cg,3)+" m", okTO?"ok":"bad", okTO?"DANS":"HORS")+
    limRow("CG sans carb.", fmt(r.zfwCg,3)+" m", okZFW?"ok":"bad", okZFW?"DANS":"HORS");

  drawChart(ac,r);
}
function limRow(k,v,cls,s){ return '<div class="lim"><span class="k">'+k+'</span><span class="v">'+v+'</span><span class="s '+cls+'">'+s+'</span></div>'; }

/* saisie : maj live + sélection complète au focus (clavier numérique) */
function bindInputs(){
  document.querySelectorAll("td.cell-in input").forEach(inp=>{
    inp.addEventListener("focus", function(){ const el=this; setTimeout(()=>{ try{el.select();}catch(e){} },0); });
    inp.addEventListener("input", function(){
      let v=num(this.value); if(v<0) v=0;
      state[current][this.dataset.id]=v; saveState(current); update();
    });
  });
}

/* ---------- ABAQUE SVG ---------- */
function drawChart(ac,r){
  const W=420,H=360,padL=46,padR=14,padT=14,padB=34, env=ac.envelope;
  let xmin=Math.min(...env.map(p=>p[0])),xmax=Math.max(...env.map(p=>p[0]));
  let ymin=Math.min(...env.map(p=>p[1])),ymax=Math.max(...env.map(p=>p[1]));
  const xp=(xmax-xmin)*0.12,yp=(ymax-ymin)*0.08; xmin-=xp;xmax+=xp;ymin-=yp;ymax+=yp;
  [[r.cg,r.mass],[r.zfwCg,r.zfwMass]].forEach(p=>{
    if(p[0]<xmin)xmin=p[0]-xp; if(p[0]>xmax)xmax=p[0]+xp;
    if(p[1]<ymin)ymin=p[1]-yp; if(p[1]>ymax)ymax=p[1]+yp;
  });
  const sx=x=>padL+(x-xmin)/(xmax-xmin)*(W-padL-padR);
  const sy=y=>H-padB-(y-ymin)/(ymax-ymin)*(H-padT-padB);
  let g="";
  niceTicks(xmin,xmax,5).forEach(tx=>{ g+=line(sx(tx),padT,sx(tx),H-padB,"var(--line)",1); g+=txt(sx(tx),H-padB+14,fmt(tx,2),"var(--faint)","middle",9); });
  niceTicks(ymin,ymax,5).forEach(ty=>{ g+=line(padL,sy(ty),W-padR,sy(ty),"var(--line)",1); g+=txt(padL-6,sy(ty)+3,fmt(ty,0),"var(--faint)","end",9); });
  g+=txt((padL+W-padR)/2,H-3,"Bras de levier (m)","var(--muted)","middle",9);
  g+='<text x="12" y="'+((padT+H-padB)/2)+'" fill="var(--muted)" font-size="9" text-anchor="middle" transform="rotate(-90 12 '+((padT+H-padB)/2)+')">Masse (kg)</text>';
  const poly=env.map(p=>sx(p[0])+","+sy(p[1])).join(" ");
  g+='<polygon points="'+poly+'" fill="rgba(47,111,159,.10)" stroke="var(--steel)" stroke-width="1.6"/>';
  g+=line(sx(r.zfwCg),sy(r.zfwMass),sx(r.cg),sy(r.mass),"var(--steel)",1.2,"3 3");
  g+=pt(sx(r.zfwCg),sy(r.zfwMass),"var(--steel)");
  g+=pt(sx(r.cg),sy(r.mass),"var(--ok)", inEnvelope(env,r.cg,r.mass)?null:"var(--bad)");
  document.getElementById("chart").innerHTML=g;
}
function line(x1,y1,x2,y2,c,w,dash){ return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(dash?' stroke-dasharray="'+dash+'"':'')+'/>'; }
function txt(x,y,t,c,a,s){ return '<text x="'+x+'" y="'+y+'" fill="'+c+'" font-size="'+s+'" text-anchor="'+a+'">'+t+'</text>'; }
function pt(x,y,fill,ring){ let s=''; if(ring) s+='<circle cx="'+x+'" cy="'+y+'" r="7.5" fill="none" stroke="'+ring+'" stroke-width="1.6"/>'; s+='<circle cx="'+x+'" cy="'+y+'" r="4.5" fill="'+fill+'" stroke="#fff" stroke-width="1.2"/>'; return s; }
function niceTicks(min,max,n){
  const span=max-min,step0=span/n,mag=Math.pow(10,Math.floor(Math.log10(step0))),norm=step0/mag;
  let step; if(norm<1.5)step=1; else if(norm<3)step=2; else if(norm<7)step=5; else step=10; step*=mag;
  const start=Math.ceil(min/step)*step,out=[]; for(let v=start;v<=max+1e-9;v+=step)out.push(v); return out;
}

/* ---------- reset double-clic (pas de confirm natif) ---------- */
let resetArmed=false,resetTimer=null;
function setupReset(){
  const btn=document.getElementById("resetBtn");
  btn.onclick=()=>{
    if(!resetArmed){
      resetArmed=true; btn.classList.add("arm"); btn.textContent="Confirmer la remise à zéro";
      resetTimer=setTimeout(()=>disarmReset(btn),3000);
    } else {
      clearTimeout(resetTimer);
      const ac=AIRCRAFT[current];
      ac.stations.forEach(st=>state[current][st.id]=st.def);
      state[current].fuelL=0; saveState(current); disarmReset(btn); buildTable(); update();
    }
  };
}
function disarmReset(btn){ resetArmed=false; btn.classList.remove("arm"); btn.textContent="Réinitialiser"; }

document.getElementById("printBtn").onclick = () => window.print();

/* ---------- orchestration ---------- */
function renderAll(){
  if(!state[current]) state[current]=loadState(current);
  disarmReset(document.getElementById("resetBtn"));
  buildTabs(); renderHeader(); renderResults();
}
document.getElementById("foot").innerHTML =
  "Aide à la préparation — recouper avec la fiche de pesée officielle de l'aéronef.<br>Données F-HPYR conformes à la pesée du 07/07/2023.";

Object.keys(AIRCRAFT).forEach(r=>state[r]=loadState(r));
setupReset(); renderAll();

/* ---------- PWA service worker + détection mise à jour ---------- */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").then(reg=>{
      reg.addEventListener("updatefound",()=>{
        const sw=reg.installing;
        sw&&sw.addEventListener("statechange",()=>{
          if(sw.state==="installed"&&navigator.serviceWorker.controller){
            document.getElementById("foot").innerHTML='<span style="color:var(--steel)">Mise à jour disponible — fermez et rouvrez l\'application.</span>';
          }
        });
      });
    }).catch(()=>{});
  });
}
